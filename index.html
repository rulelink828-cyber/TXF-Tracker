<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎯 微台 × ST 三維觀測站 (動態特赦版)</title>
    <style>
        :root { --bg-color: #121826; --panel-bg: #1f2937; --text-main: #f3f4f6; --text-muted: #9ca3af; --green: #10b981; --red: #ef4444; --border: #374151; --blue: #3b82f6; --yellow: #f59e0b; --purple: #a855f7;}
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 15px; }
        .container { max-width: 650px; margin: auto; }
        h2 { text-align: center; color: var(--blue); margin-top: 5px; font-size: 20px; }
        .panel { background-color: var(--panel-bg); border: 1px solid var(--border); border-radius: 10px; padding: 15px; margin-bottom: 15px;}
        
        .cloud-status { background: rgba(59, 130, 246, 0.1); border: 1px solid var(--blue); padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s;}
        .cloud-status:active { transform: scale(0.98); }
        
        .row { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;}
        .col { flex: 1; min-width: 30%; text-align: center; padding: 12px 5px; border-radius: 8px; border: 1px solid var(--border); background: #111827; display: flex; flex-direction: column; justify-content: center;}
        
        .title-label { font-size: 12px; color: var(--text-muted); margin-bottom: 5px;}
        .data-value { font-size: 18px; font-weight: bold; }
        .sub-value { font-size: 13px; margin-top: 5px; padding: 2px 6px; border-radius: 4px; display: inline-block;}

        .status-box { padding: 20px; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: center; min-height: 80px; display: flex; flex-direction: column; justify-content: center; border: 2px dashed var(--border); margin-top: 15px;}
        .status-approved { background-color: rgba(16, 185, 129, 0.1); border-color: var(--green); color: var(--green); }
        .status-rejected { background-color: rgba(239, 68, 68, 0.1); border-color: var(--red); color: var(--red); }
        .status-warning { background-color: rgba(245, 158, 11, 0.1); border-color: var(--yellow); color: var(--yellow); }
        .status-amnesty { background-color: rgba(168, 85, 247, 0.1); border-color: var(--purple); color: var(--purple); }
        .status-neutral { background-color: #374151; color: var(--text-main); border-style: solid; }
        
        button { width: 100%; padding: 15px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; transition: 0.2s;}
        
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
        th, td { padding: 8px; text-align: center; border-bottom: 1px solid var(--border); }
        th { background-color: #111827; color: var(--text-muted); white-space: nowrap; }
        .time-cell { font-size: 10px; color: #d1d5db; white-space: nowrap; }
    </style>
</head>
<body>

<div class="container">
    <h2>🎯 微台 × ST 觀測站</h2>
    
    <div class="cloud-status" onclick="fetchGoogleSheet()">
        <div>
            <div style="font-size: 12px; color: #60a5fa;">🟢 點擊手動刷新雲端數據</div>
            <div style="font-weight: bold; font-size: 14px;" id="syncText">與 Google 雲端同步中...</div>
        </div>
        <div style="text-align: right;">
            <div style="font-size: 12px; color: var(--text-muted);">最後更新時間</div>
            <div id="cloudTime" style="font-size: 13px; font-weight: bold; color: white;">載入中...</div>
        </div>
    </div>

    <!-- 雲端數據儀表板 (三個維度) -->
    <div class="row">
        <div class="col" id="stCard">
            <div class="title-label">📌 ST 動能 (4H)</div>
            <div id="cloudST" class="data-value">讀取中</div>
            <div id="cloudPrice" style="font-size: 11px; color: gray; margin-top: 5px;"></div>
        </div>
        <div class="col" id="maCard">
            <div class="title-label">🛡️ 89MA 趨勢 (4H)</div>
            <div id="cloudMA" class="data-value" style="color: white;">讀取中</div>
            <div id="cloudMASlope" class="sub-value" style="background: #374151; color: white;">讀取中</div>
        </div>
        <div class="col" id="ratioCard">
            <div class="title-label">⚡ 散戶燃料 (日更)</div>
            <div id="cloudRatio" class="data-value" style="color: white;">讀取中</div>
            <div id="cloudRatioText" class="sub-value" style="background: #374151; color: white;">讀取中</div>
        </div>
    </div>

    <!-- 系統大腦判定 -->
    <div class="panel" style="margin-top: 15px; border-left: 5px solid var(--blue);">
        <label style="color: #60a5fa; font-weight: bold;">🧠 系統三維度綜合判定</label>
        <div id="strategyBox" class="status-box status-neutral">
            等待雲端資料載入...
        </div>
        <button style="background: var(--blue); color: white; margin-top: 15px;" onclick="logSignal()">💾 紀錄當下觀測狀態</button>
    </div>

    <!-- 觀測紀錄 -->
    <div class="panel">
        <label style="color: var(--text-muted); font-weight: bold; font-size: 14px;">📋 我的觀測紀錄</label>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>紀錄時間</th>
                        <th>ST</th>
                        <th>89MA狀態</th>
                        <th>散戶籌碼</th>
                        <th>判定結果</th>
                    </tr>
                </thead>
                <tbody id="logTableBody"></tbody>
            </table>
        </div>
        <button onclick="clearLogs()" style="background: transparent; color: gray; font-size: 12px; margin-top: 10px; padding: 5px;">清除所有紀錄</button>
    </div>
</div>

<script>
    // 🔴🔴🔴 請替換成你的 Google CSV 網址 🔴🔴🔴
    const GOOGLE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTjF_5sGbShxJ_e0m_AwhBtZirT2DGgQVpMxW2wy5Jt95Sc7TXa_IAL5Gjt0N2whk_xGuJimnFGvqgD/pub?output=csv";

    let currentData = {
        time: "", ratio: null, ratioText: "",
        st: "", price: "", 
        maPos: "", maSlope: "",
        actionResult: "", isApproved: false, statusClass: "", logIcon: ""
    };

    async function fetchGoogleSheet() {
        document.getElementById('syncText').innerText = "🔄 資料抓取中...";
        try {
            const separator = GOOGLE_CSV_URL.includes('?') ? '&' : '?';
            const res = await fetch(GOOGLE_CSV_URL + separator + "t=" + new Date().getTime());
            if (!res.ok) throw new Error("網路錯誤");
            const csvText = await res.text();
            const rows = csvText.split('\n');
            if (rows.length < 2) throw new Error("無資料");
            
            const dataRow = rows[1].split(','); 
            
            currentData.time = dataRow[0] ? dataRow[0].trim() : "未填寫";
            currentData.ratio = parseFloat(dataRow[1].trim());
            currentData.st = dataRow[2] ? dataRow[2].trim().toUpperCase() : "";
            currentData.maPos = dataRow[3] ? dataRow[3].trim().toUpperCase() : "";
            currentData.maSlope = dataRow[4] ? dataRow[4].trim().toUpperCase() : "";
            currentData.price = dataRow[5] ? dataRow[5].trim() : "";

            parseRatioText();
            updateDashboardUI();
            evaluateStrategy();
            
            document.getElementById('syncText').innerText = "✅ 同步成功 (點擊刷新)";
        } catch (error) {
            document.getElementById('syncText').innerHTML = `<span style="color:red;">❌ 讀取失敗</span>`;
            console.error(error);
        }
    }

    // 將籌碼 % 數轉換為文字定義
    function parseRatioText() {
        let r = currentData.ratio;
        if (r >= 20) currentData.ratioText = "強空";
        else if (r >= 10) currentData.ratioText = "弱空";
        else if (r >= 0) currentData.ratioText = "微空";
        else if (r > -10) currentData.ratioText = "微多";
        else if (r > -20) currentData.ratioText = "中多";
        else currentData.ratioText = "強多";
    }

    // 更新儀表板 UI
    function updateDashboardUI() {
        document.getElementById('cloudTime').innerText = currentData.time;

        let stText = document.getElementById('cloudST');
        if (currentData.st === 'LONG') stText.innerHTML = `<span style="color:var(--green)">🟢 做多</span>`;
        else if (currentData.st === 'SHORT') stText.innerHTML = `<span style="color:var(--red)">🔴 做空</span>`;
        else stText.innerText = "未指定";
        document.getElementById('cloudPrice').innerText = currentData.price ? `點位: ${currentData.price}` : "-";

        let maText = document.getElementById('cloudMA');
        if (currentData.maPos === 'ABOVE') maText.innerHTML = `<span style="color:var(--green)">之上</span>`;
        else if (currentData.maPos === 'BELOW') maText.innerHTML = `<span style="color:var(--red)">之下</span>`;
        else maText.innerText = "-";

        let slopeBox = document.getElementById('cloudMASlope');
        if (currentData.maSlope === 'UP') { slopeBox.innerText = "↗ 上行"; slopeBox.style.background = "rgba(16,185,129,0.2)"; slopeBox.style.color = "var(--green)";}
        else if (currentData.maSlope === 'DOWN') { slopeBox.innerText = "↘ 下行"; slopeBox.style.background = "rgba(239,68,68,0.2)"; slopeBox.style.color = "var(--red)";}
        else if (currentData.maSlope === 'FLAT') { slopeBox.innerText = "→ 走平"; slopeBox.style.background = "#374151"; slopeBox.style.color = "white";}

        let rColor = currentData.ratio >= 0 ? "var(--red)" : "var(--green)";
        let rBg = currentData.ratio >= 0 ? "rgba(239,68,68,0.2)" : "rgba(16,185,129,0.2)";
        document.getElementById('cloudRatio').innerHTML = `<span style="color:${rColor}">${currentData.ratio}%</span>`;
        
        let ratioBox = document.getElementById('cloudRatioText');
        ratioBox.innerText = currentData.ratioText;
        ratioBox.style.background = rBg;
        ratioBox.style.color = rColor;
    }

    // 🧠 核心大腦：加入微區間特赦機制
    function evaluateStrategy() {
        let box = document.getElementById('strategyBox');
        box.className = "status-box"; 

        if (!currentData.st || !currentData.maPos || currentData.ratio === null) {
            box.innerHTML = "等待完整雲端參數..."; box.classList.add("status-neutral"); return;
        }

        let isTrendUp = (currentData.maPos === 'ABOVE' && currentData.maSlope !== 'DOWN');
        let isTrendDown = (currentData.maPos === 'BELOW' && currentData.maSlope !== 'UP');
        
        let isRatioSupportingLong = (currentData.ratio < 0);
        let isRatioSupportingShort = (currentData.ratio >= 0);
        
        let isRatioMicro = (currentData.ratio >= 0 && currentData.ratio < 10) || (currentData.ratio < 0 && currentData.ratio > -10);

        if (currentData.st === 'LONG') {
            if (isRatioSupportingLong && isTrendUp) {
                currentData.isApproved = true; currentData.statusClass = "status-approved"; currentData.logIcon = "🌟";
                currentData.actionResult = `🌟 完美順勢做多<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>ST翻多 + 均線多頭 + 散戶${currentData.ratioText}助攻</span>`;
            } else if (isRatioSupportingLong && !isTrendUp) {
                currentData.isApproved = true; currentData.statusClass = "status-warning"; currentData.logIcon = "⚠️";
                currentData.actionResult = `⚠️ 逆勢搶多彈<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>ST與散戶支持，但目前在 89MA之下 (建議微量試單)</span>`;
            } else if (!isRatioSupportingLong && isRatioMicro && isTrendUp) {
                // 特赦機制：籌碼是微空，但技術面(ST與MA)強力支持做多
                currentData.isApproved = true; currentData.statusClass = "status-amnesty"; currentData.logIcon = "🔮";
                currentData.actionResult = `🔮 特赦微量做多<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>籌碼處於「${currentData.ratioText}」遲滯區，但技術面(ST+MA)雙雙翻多，可微量試單</span>`;
            } else {
                currentData.isApproved = false; currentData.statusClass = "status-rejected"; currentData.logIcon = "❌";
                currentData.actionResult = `❌ 拒絕做多<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>散戶為「${currentData.ratioText}」且無強烈技術面支持，提防騙線</span>`;
            }

        } else if (currentData.st === 'SHORT') {
            if (isRatioSupportingShort && isTrendDown) {
                currentData.isApproved = true; currentData.statusClass = "status-approved"; currentData.logIcon = "🌟";
                currentData.actionResult = `🌟 完美順勢做空<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>ST翻空 + 均線空頭 + 散戶${currentData.ratioText}助攻</span>`;
            } else if (isRatioSupportingShort && !isTrendDown) {
                currentData.isApproved = true; currentData.statusClass = "status-warning"; currentData.logIcon = "⚠️";
                currentData.actionResult = `⚠️ 逆勢搶空跌<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>ST與散戶支持，但目前在 89MA之上 (建議微量試單)</span>`;
            } else if (!isRatioSupportingShort && isRatioMicro && isTrendDown) {
                // 特赦機制：籌碼是微多，但技術面(ST與MA)強力支持做空
                currentData.isApproved = true; currentData.statusClass = "status-amnesty"; currentData.logIcon = "🔮";
                currentData.actionResult = `🔮 特赦微量做空<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>籌碼處於「${currentData.ratioText}」遲滯區，但技術面(ST+MA)雙雙翻空，可微量試單</span>`;
            } else {
                currentData.isApproved = false; currentData.statusClass = "status-rejected"; currentData.logIcon = "❌";
                currentData.actionResult = `❌ 拒絕做空<br><span style='font-size:13px; font-weight:normal; margin-top:5px; display:block;'>散戶為「${currentData.ratioText}」且無強烈技術面支持，提防假跌破</span>`;
            }
        }
        
        box.classList.add(currentData.statusClass);
        box.innerHTML = currentData.actionResult;
    }

    function logSignal() {
        if (!currentData.st || currentData.ratio === null) { alert("雲端資料不完整！"); return; }
        
        let now = new Date();
        let fullTimeStr = `${now.getFullYear()}-${(now.getMonth()+1).toString().padStart(2,'0')}-${now.getDate().toString().padStart(2,'0')} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        // 依照狀態分配紀錄表的文字顏色
        let logColor = "color: #9ca3af; text-decoration: line-through;";
        if (currentData.statusClass === 'status-approved') logColor = "color: var(--green); font-weight: bold;";
        if (currentData.statusClass === 'status-warning') logColor = "color: var(--yellow);";
        if (currentData.statusClass === 'status-amnesty') logColor = "color: var(--purple); font-weight: bold;";

        let logActionText = currentData.isApproved ? `${currentData.logIcon} 核准試單` : "❌ 拒絕";
        if (currentData.statusClass === 'status-approved') logActionText = "🌟 完美順勢";

        let logEntry = {
            time: fullTimeStr,
            signal: currentData.st === 'LONG' ? '🟢 多' : '🔴 空',
            ma: `${currentData.maPos==='ABOVE'?'上':'下'}(${currentData.maSlope})`,
            ratio: `${currentData.ratio}% (${currentData.ratioText})`,
            action: logActionText,
            color: logColor
        };

        let logs = JSON.parse(localStorage.getItem('myLogs') || "[]");
        logs.unshift(logEntry);
        localStorage.setItem('myLogs', JSON.stringify(logs));
        renderTable();
    }

    function renderTable() {
        let logs = JSON.parse(localStorage.getItem('myLogs') || "[]");
        let tbody = document.getElementById('logTableBody');
        tbody.innerHTML = "";
        logs.forEach(log => {
            tbody.innerHTML += `<tr><td class="time-cell">${log.time}</td><td>${log.signal}</td><td>${log.ma}</td><td>${log.ratio}</td><td style="${log.color}">${log.action}</td></tr>`;
        });
    }

    function clearLogs() {
        if(confirm("確定清除本機所有紀錄嗎？")) { localStorage.removeItem('myLogs'); renderTable(); }
    }

    fetchGoogleSheet();
    renderTable();
</script>
</body>
</html>
